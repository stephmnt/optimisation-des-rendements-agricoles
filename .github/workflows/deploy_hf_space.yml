name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy_hf_space.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "config/**"
      - "main.py"
      - "scripts/**"
      - "streamlit/**"
      - "tests/**"
      - "data/dataset_consolide.csv"
      - "data/simulation/crop_yield.csv"
      - "artifacts/models/p1_historical_pipeline.joblib"
      - "artifacts/models/p1_historical_metadata.json"
      - "artifacts/models/p23_simulation_pipeline.joblib"
      - "artifacts/models/p23_simulation_metadata.json"
      - "artifacts/experiments/experience_1/dataset_consolide_historique_colonnes.csv"
      - "agriculture.png"
      - "!notebooks/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r streamlit/requirements.txt mlflow==3.10.1 pytest

      - name: Run pytest
        run: >
          python -m pytest -q
          tests/test_api.py
          tests/test_streamlit.py
          tests/test_mlflow_logging.py
          tests/test_promote_registered_model.py

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment artifacts
        run: python3 scripts/deployment_payload.py validate

      - name: Build Space payload
        run: python3 scripts/deployment_payload.py build --output-dir .hf_space_build

      - name: Build Docker image
        run: docker build -t rendement-agricole-space:ci .hf_space_build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment artifacts
        run: python3 scripts/deployment_payload.py validate

      - name: Validate Hugging Face token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Le secret GitHub Actions HF_TOKEN est absent."
            exit 1
          fi
          case "$HF_TOKEN" in
            hf_*) ;;
            *)
              echo "::error::HF_TOKEN ne ressemble pas a un token Hugging Face valide."
              exit 1
              ;;
          esac

      - name: Build Space payload
        run: python3 scripts/deployment_payload.py build --output-dir .hf_space_build

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: stephmnt/rendement_agricole
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
          subdirectory: .hf_space_build
