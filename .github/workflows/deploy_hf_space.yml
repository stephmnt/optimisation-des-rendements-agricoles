name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy_hf_space.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "main.py"
      - "streamlit/**"
      - "tests/**"
      - "data/dataset_consolide.csv"
      - "agriculture.png"
      - "!notebooks/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r streamlit/requirements.txt pytest

      - name: Run pytest
        run: python -m pytest -q tests

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Space payload
        run: |
          rm -rf .hf_space_build
          mkdir -p \
            .hf_space_build/streamlit/src \
            .hf_space_build/streamlit/icones \
            .hf_space_build/data \
            .hf_space_build/artifacts/models
          cp Dockerfile .hf_space_build/Dockerfile
          cp streamlit/requirements.txt .hf_space_build/streamlit/requirements.txt
          cp -R streamlit/src/. .hf_space_build/streamlit/src/
          cp -R streamlit/icones/. .hf_space_build/streamlit/icones/
          cp data/dataset_consolide.csv .hf_space_build/data/dataset_consolide.csv
          cp main.py .hf_space_build/main.py
          touch .hf_space_build/artifacts/models/.keep
          cat <<'EOF' > .hf_space_build/README.md
          ---
          title: Rendement Agricole
          emoji: 🌾
          colorFrom: green
          colorTo: yellow
          sdk: docker
          app_port: 8501
          tags:
          - streamlit
          - agriculture
          pinned: false
          short_description: Démo Streamlit + FastAPI de rendement agricole
          license: mit
          ---
          
          # Rendement Agricole
          
          Ce Space Docker expose une interface Streamlit connectée à une API FastAPI interne dans le même conteneur.
          
          - UI Streamlit : port public `8501`
          - API FastAPI : port interne `127.0.0.1:8000`
          - modèle servi : artefact entraîné si disponible, sinon fallback Ridge entraîné depuis `data/dataset_consolide.csv`
          EOF
          if [ -f artifacts/models/best_pipeline.joblib ]; then
            cp artifacts/models/best_pipeline.joblib .hf_space_build/artifacts/models/best_pipeline.joblib
          fi
          if [ -f agriculture.png ]; then
            cp agriculture.png .hf_space_build/agriculture.png
          fi

      - name: Build Docker image
        run: docker build -t rendement-agricole-space:ci .hf_space_build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Hugging Face token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Le secret GitHub Actions HF_TOKEN est absent."
            exit 1
          fi
          case "$HF_TOKEN" in
            hf_*) ;;
            *)
              echo "::error::HF_TOKEN ne ressemble pas a un token Hugging Face valide."
              exit 1
              ;;
          esac

      - name: Build Space payload
        run: |
          rm -rf .hf_space_build
          mkdir -p \
            .hf_space_build/streamlit/src \
            .hf_space_build/streamlit/icones \
            .hf_space_build/data \
            .hf_space_build/artifacts/models
          cp Dockerfile .hf_space_build/Dockerfile
          cp streamlit/requirements.txt .hf_space_build/streamlit/requirements.txt
          cp -R streamlit/src/. .hf_space_build/streamlit/src/
          cp -R streamlit/icones/. .hf_space_build/streamlit/icones/
          cp data/dataset_consolide.csv .hf_space_build/data/dataset_consolide.csv
          cp main.py .hf_space_build/main.py
          touch .hf_space_build/artifacts/models/.keep
          cat <<'EOF' > .hf_space_build/README.md
          ---
          title: Rendement Agricole
          emoji: 🌾
          colorFrom: green
          colorTo: yellow
          sdk: docker
          app_port: 8501
          tags:
          - streamlit
          - agriculture
          pinned: false
          short_description: Démo Streamlit + FastAPI de rendement agricole
          license: mit
          ---
          
          # Rendement Agricole
          
          Ce Space Docker expose une interface Streamlit connectée à une API FastAPI interne dans le même conteneur.
          
          - UI Streamlit : port public `8501`
          - API FastAPI : port interne `127.0.0.1:8000`
          - modèle servi : artefact entraîné si disponible, sinon fallback Ridge entraîné depuis `data/dataset_consolide.csv`
          EOF
          if [ -f artifacts/models/best_pipeline.joblib ]; then
            cp artifacts/models/best_pipeline.joblib .hf_space_build/artifacts/models/best_pipeline.joblib
          fi
          if [ -f agriculture.png ]; then
            cp agriculture.png .hf_space_build/agriculture.png
          fi

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: stephmnt/rendement_agricole
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
          subdirectory: .hf_space_build
